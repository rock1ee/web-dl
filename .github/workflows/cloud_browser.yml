name: Cloud Browser via NoVNC

on:
  workflow_dispatch:

jobs:
  run-browser:
    runs-on: ubuntu-latest
    
    steps:
      - name: Free up disk space (Optional but good for Docker)
        run: |
          sudo rm -rf /usr/share/dotnet /opt/ghc /usr/local/lib/android /usr/local/share/boost

      - name: Start Webtop (Cloud Browser Container)
        run: |
          echo "Pulling and starting Webtop (Alpine XFCE + Chromium)..."
          # 使用极轻量的 alpine-chromium 镜像，启动速度极快
          docker run -d \
            --name=webtop \
            --security-opt seccomp=unconfined \ # 允许 Chromium 沙盒运行
            -e PUID=1000 \
            -e PGID=1000 \
            -e TZ=Etc/UTC \
            -p 3000:3000 \
            -v /dev/shm:/dev/shm \ # 防止 Chrome 崩溃的关键参数
            linuxserver/webtop:alpine-chromium
          
          # 等待容器启动完成
          sleep 10

      - name: Setup Cloudflare Tunnel
        uses: AnimMouse/setup-cloudflared@v2
        
      - name: Expose Webtop via Tunnel
        uses: AnimMouse/setup-cloudflared/tunnel@v2
        with:
          url: http://localhost:3000

      - name: Keep Alive
        run: |
          echo "======================================================="
          echo "✅ 云端浏览器已就绪！"
          echo "🌐 展开上一层的 [Setup cloudflared tunnel] 查看入口 URL"
          echo "💻 在你的本地浏览器打开该 URL，你将看到一个完整的桌面和 Chrome！"
          echo "======================================================="
          sleep 6h
