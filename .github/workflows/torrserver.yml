name: Stream via TorrServer

on:
  workflow_dispatch:
    # 移除了多余的 input 参数，直接在网页端操作即可

jobs:
  stream:
    runs-on: ubuntu-24.04
    if: github.event.repository.owner.id == github.event.sender.id

    steps:
      - name: Maximize build space
        uses: easimon/maximize-build-space@master
        with:
          root-reserve-mb: 512
          swap-size-mb: 1024

      - name: Setup cloudflared
        uses: AnimMouse/setup-cloudflared@v2
        
      - name: Setup cloudflared tunnel
        uses: AnimMouse/setup-cloudflared/tunnel@v2
        with:
          url: http://localhost:8090

      - name: Download TorrServer
        run: |
            wget https://github.com/YouROK/TorrServer/releases/latest/download/TorrServer-linux-amd64
            chmod +x TorrServer-linux-amd64
            mkdir -p ./torr_data

      - name: Run TorrServer with Auto-Tuning
        run: |
          echo "======================================================="
          echo "✅ TorrServer 即将启动！"
          echo "🌐 请展开上方 [Setup cloudflared tunnel] 步骤查看公网网址！"
          echo "🛠️ 引擎优化：15GB超大磁盘缓存 / 强加密 / 自动追加Tracker / 关闭UPNP"
          echo "⏹️ 观影结束后，请在网页端设置里点击【关闭服务器】结束任务。"
          echo "======================================================="
          
          # 【魔法时刻】利用后台子进程，在服务启动后延时 3 秒，通过 API 自动注入调优参数
          (
            sleep 3
            curl -s -X POST -H "Content-Type: application/json" \
                 -d '{
                       "action": "set",
                       "sets": {
                         "UseDisk": true,
                         "CacheSize": 16106127360,
                         "PreloadCache": 20,
                         "ForceEncrypt": true,
                         "RetrackersMode": 1,
                         "DisableUPNP": true
                       }
                     }' \
                 http://127.0.0.1:8090/settings > /dev/null
            echo -e "\n[Auto-Config] 🚀 参数调优已通过内部 API 下发并即时生效！"
          ) &

          # 前台阻塞运行 TorrServer，直到你在网页端点击退出
          ./TorrServer-linux-amd64 -d ./torr_data -p 8090

      - name: Delete workflow runs
        if: always()
        uses: Mattraks/delete-workflow-runs@v2
        with:
          token: ${{ github.token }}
          repository: ${{ github.repository }}
          retain_days: 3
          keep_minimum_runs: 0
          delete_workflow_pattern: Stream via TorrServer
          # 加入了 success，这样你在网页端正常关闭导致的成功运行也会被清理
          delete_run_by_conclusion_pattern: cancelled, failure, success
